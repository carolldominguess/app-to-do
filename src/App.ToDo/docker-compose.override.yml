      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=AppToDoDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
